<!DOCTYPE html>
<html>
<head>
    <title>ZEE5-Watch TV Show, web series</title>
    <!--custom css-->
    <link href="./css/style.css" rel="stylesheet"/>
    <link href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqvLulEeVQC2zyJur0N8OahaXBXg29bENRpe0tUWoVoQ&s=10" rel="icon"/>
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <header>
        <div class="hed-section">
            <div class="hed-container">
                <div class="section1">
                    <div class="logo">
                        <span><img  src="https://akamaividz2.zee5.com/image/upload/frontend/branding/images/version-2/logo.png" alt="zee5 logo"></span>
                    </div>
                    <div class="nav-bar">
                        <a href="#">Home</a>
                        <a href="#">FIFA 2026</a>
                        <a href="#">TV Shows</a>
                        <a href="#">TV Shows</a>
                        <a href="#">Movies</a>
                        <a href="#">FREE5</a>
                        <a href="#">Web Series</a>
                        <a href="#">KidZ</a>
                        <a href="#">Live TV</a>
                        <a href="#">LOLZ</a>
                        <a href="#"><i class="ri-grid-fill"></i></i></a>
                    </div>
                </div>
                <div class="section2">
                    <div class="search-btn">
                        <span class="btn">
                            <button class="pro"><i class="ri-search-2-line"></i></button>
                        </span>
                        <span class="search">
                            <input class="pro" type="text" placeholder="search for Movies,Shows,Channels etc."/>
                        </span>
                    </div>
                    <div class="hed-phone">
                        <img src="./image/hed-phone.png"/>
                    </div>
                    <div class="btn-lang">
                        <button class="pro">
                        <i class="ri-translate"></i>
                        </button>
                    </div>
                    <div class="login-btn">
                        LOGIN
                    </div>
                    <div class="buy-btn">
                        <i class="ri-vip-crown-fill"></i> BUY PLAN
                    </div>
                    <div class="btn-lang">
                        <button class="pro">
                        <i class="ri-menu-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
